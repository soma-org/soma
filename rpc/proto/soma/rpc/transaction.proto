syntax = "proto3";

package soma.rpc;

import "google/protobuf/duration.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";
import "soma/rpc/object.proto";
import "soma/rpc/object_reference.proto";

// A transaction.
message Transaction {

  // The digest of this Transaction.
  optional string digest = 1;

  optional TransactionKind kind = 2;
  optional string sender = 3;
  repeated ObjectReference gas_payment = 4;

  // Replay-protection declaration (Stage 5.5). Default `None` for txs
  // with owned inputs (replay-protected by version-bump); stateless
  // txs (post-Stage 6 gas-from-balance) must declare `ValidDuring`.
  // CRITICAL: this field MUST be in the BCS encoding of TransactionData
  // because it's covered by the user's signature; dropping it on the
  // wire causes signature verification failures.
  optional TransactionExpiration expiration = 5;
}

// Transaction expiration: replay-protection declaration on a tx.
message TransactionExpiration {
  oneof value {
    // No declared expiration. Used by txs with owned inputs (where
    // version-bump on consumption provides replay protection).
    google.protobuf.Empty none = 1;
    ValidDuring valid_during = 2;
  }
}

// Stateless replay-protection window. Width is bound to 2 epochs:
// `max_epoch == min_epoch` or `max_epoch == min_epoch + 1`.
message ValidDuring {
  optional uint64 min_epoch = 1;
  optional uint64 max_epoch = 2;
  // Chain identifier this tx is valid on (32-byte CheckpointDigest of
  // genesis). Cross-chain replay defense.
  optional bytes chain = 3;
  // Arbitrary u32 to differentiate otherwise-identical txs in the
  // digest cache. Not consulted by the protocol; only affects digest.
  optional uint32 nonce = 4;
}

// Transaction type.
message TransactionKind {
  oneof kind {
    // Transaction used to initialize the chain state.
    //
    // Only valid if in the genesis checkpoint (0) and if this is the very first transaction ever
    // executed on the chain.
    GenesisTransaction genesis = 1;

    // Consensus commit update.
    ConsensusCommitPrologue consensus_commit_prologue = 2;

    // System transaction used to end an epoch..
    ChangeEpoch change_epoch = 3;

    AddValidator add_validator = 4;

    RemoveValidator remove_validator = 5;

    ReportValidator report_validator = 6;

    UndoReportValidator undo_report_validator = 7;

    UpdateValidatorMetadata update_validator_metadata = 8;

    SetCommissionRate set_commission_rate = 9;

    TransferCoin transfer_coin = 10;

    PayCoins pay_coins = 11;

    TransferObjects transfer_objects = 12;

    AddStake add_stake = 13;

    WithdrawStake withdraw_stake = 14;

    // Model transactions
    CreateModel create_model = 33;
    CommitModel commit_model = 15;
    RevealModel reveal_model = 16;
    // Field 17 was CommitModelUpdate (removed)
    // Field 18 was RevealModelUpdate (removed)
    AddStakeToModel add_stake_to_model = 19;
    SetModelCommissionRate set_model_commission_rate = 20;
    DeactivateModel deactivate_model = 21;
    ReportModel report_model = 22;
    UndoReportModel undo_report_model = 23;

    // Submission transactions
    SubmitData submit_data = 24;
    ClaimRewards claim_rewards = 25;
    ReportSubmission report_submission = 28;
    UndoReportSubmission undo_report_submission = 29;

    // Challenge transactions (deprecated)
    InitiateChallenge initiate_challenge = 26;
    // Field 27 was ResolveAudit (removed)
    ReportChallenge report_challenge = 30;
    UndoReportChallenge undo_report_challenge = 31;
    ClaimChallengeBond claim_challenge_bond = 32;

    // Bridge transactions
    BridgeDeposit bridge_deposit = 40;
    BridgeWithdraw bridge_withdraw = 41;
    BridgeEmergencyPause bridge_emergency_pause = 42;
    BridgeEmergencyUnpause bridge_emergency_unpause = 43;

    // Payment-channel transactions (Phase 1)
    OpenChannel open_channel = 50;
    Settle settle = 51;
    RequestClose request_close = 52;
    WithdrawAfterTimeout withdraw_after_timeout = 53;

    // Per-commit accumulator settlement system transaction (Stage 6a).
    Settlement settlement = 60;

    // Stateless value transfer from sender's accumulator balance to
    // one or more recipients (Stage 7). Sender pays gas balance-mode
    // too, so the entire tx has zero owned inputs.
    BalanceTransfer balance_transfer = 61;
  }
}

// Stage 7: stateless balance-mode value transfer.
message BalanceTransfer {
  // Coin type label ("USDC", "SOMA"). All transfers in one tx share
  // the same coin type.
  optional string coin_type = 1;
  // (recipient, amount) pairs.
  repeated BalanceTransferEntry transfers = 2;
}

message BalanceTransferEntry {
  optional string recipient = 1;
  optional uint64 amount = 2;
}

// Bridge messages

message BridgeDeposit {
  optional uint64 nonce = 1;
  optional bytes eth_tx_hash = 2;
  optional string recipient = 3;
  optional uint64 amount = 4;
  optional bytes aggregated_signature = 5;
  optional bytes signer_bitmap = 6;
}

message BridgeWithdraw {
  // Stage 12: amount is debited from the sender's USDC accumulator;
  // no payment coin object is read. Field 1 (payment_coin) was removed.
  optional uint64 amount = 2;
  optional bytes recipient_eth_address = 3;
}

message BridgeEmergencyPause {
  optional bytes aggregated_signature = 1;
  optional bytes signer_bitmap = 2;
}

message BridgeEmergencyUnpause {
  optional bytes aggregated_signature = 1;
  optional bytes signer_bitmap = 2;
}

message AddValidator {
  optional bytes pubkey_bytes = 1;
  optional bytes network_pubkey_bytes = 2;
  optional bytes worker_pubkey_bytes = 3;
  optional bytes net_address = 4;
  optional bytes p2p_address = 5;
  optional bytes primary_address = 6;
  optional bytes proxy_address = 7;
  optional bytes proof_of_possession = 8;
}

message RemoveValidator {
  optional bytes pubkey_bytes = 1;
}

message ReportValidator {
  optional string reportee = 1;
}

message UndoReportValidator {
  optional string reportee = 1;
}

message UpdateValidatorMetadata {
  optional bytes next_epoch_network_address = 1;
  optional bytes next_epoch_p2p_address = 2;
  optional bytes next_epoch_primary_address = 3;
  optional bytes next_epoch_proxy_address = 4;
  optional bytes next_epoch_protocol_pubkey = 5;
  optional bytes next_epoch_worker_pubkey = 6;
  optional bytes next_epoch_network_pubkey = 7;
  optional bytes next_epoch_proof_of_possession = 8;
}

message SetCommissionRate {
  optional uint64 new_rate = 1;
}

message TransferCoin {
  optional ObjectReference coin = 1;
  optional uint64 amount = 2;
  optional string recipient = 3;
}

message PayCoins {
  repeated ObjectReference coins = 1;
  repeated uint64 amounts = 2;
  repeated string recipients = 3;
}

message TransferObjects {
  repeated ObjectReference objects = 1;
  optional string recipient = 2;
}

// Stage 9d-C2: AddStake is balance-mode — no coin reference. The
// executor debits `amount` SOMA from the sender's accumulator.
message AddStake {
  // Validator's SOMA address (hex string).
  optional string validator = 1;
  // Stake principal in shannons.
  optional uint64 amount = 2;
}


message WithdrawStake {
  optional ObjectReference staked_soma = 1;
}

message Metadata {
  oneof version {
    MetadataV1 v1 = 1;
  }
}

message MetadataV1 {
  optional bytes checksum = 1;  // 32-byte digest
  optional uint64 size = 2;      // Size in bytes
}

message Manifest {
  oneof version {
    ManifestV1 v1 = 1;
  }
}

message ManifestV1 {
  optional string url = 1;
  optional Metadata metadata = 2;
}

// Model weights manifest: URL + metadata + decryption key.
// Used by RevealModel transaction and by Model in system state.
message ModelWeightsManifest {
  optional Manifest manifest = 1;
  optional bytes decryption_key = 2;     // 32-byte AES-256 key
}

// Pending update to an active model's weights (commit phase).
message PendingModelUpdate {
  optional Manifest manifest = 1;
  optional bytes weights_commitment = 2;
  optional bytes embedding_commitment = 3;     // 32-byte hash
  optional bytes decryption_key_commitment = 4; // 32-byte hash
  optional uint64 commit_epoch = 5;
}

// Model transaction messages

message CreateModel {
  optional uint64 stake_amount = 1;
  optional uint64 commission_rate = 2;
  optional uint64 architecture_version = 3;
}

message CommitModel {
  optional string model_id = 1;
  optional Manifest manifest = 2;
  optional bytes weights_commitment = 3;
  optional bytes embedding_commitment = 4;
  optional bytes decryption_key_commitment = 5;
}

message RevealModel {
  optional string model_id = 1;
  optional bytes decryption_key = 2;     // 32-byte AES-256 key
  repeated float embedding = 3;          // Full model embedding revealed here
}


message AddStakeToModel {
  optional string model_id = 1;
  optional ObjectReference coin_ref = 2;
  optional uint64 amount = 3;
}

message SetModelCommissionRate {
  optional string model_id = 1;
  optional uint64 new_rate = 2;
}

message DeactivateModel {
  optional string model_id = 1;
}

message ReportModel {
  optional string model_id = 1;
}

message UndoReportModel {
  optional string model_id = 1;
}

// Report a submission as fraudulent (validators only)
message ReportSubmission {
  optional string target_id = 1;
  // Optional challenger to attribute fraud to (for tally-based bond distribution)
  optional string challenger = 2;
}

// Undo a previous submission report
message UndoReportSubmission {
  optional string target_id = 1;
}


// System transaction used to change the epoch.
message ChangeEpoch {
  // The next (to become) epoch ID.
  optional uint64 epoch = 1;

  // Unix timestamp when epoch started.
  optional google.protobuf.Timestamp epoch_start_timestamp = 2;

  // The protocol version in effect in the new epoch.
  optional uint64 protocol_version = 3;

  // The total amount of fees charged during the epoch.
  optional uint64 fees = 4;

  /// Epoch randomness
  optional bytes epoch_randomness = 5;
}


// The genesis transaction.
message GenesisTransaction {
  // Set of genesis objects.
  repeated Object objects = 1;
}

// Consensus commit prologue system transaction.
message ConsensusCommitPrologue {
  // Epoch of the commit prologue transaction.
  optional uint64 epoch = 1;

  // Consensus round of the commit.
  optional uint64 round = 2;

  // The sub DAG index of the consensus commit. This field is populated if there
  // are multiple consensus commits per round.
  optional uint64 sub_dag_index = 3;

  // Unix timestamp from consensus.
  optional google.protobuf.Timestamp commit_timestamp = 4;

  // Digest of consensus output.
  optional string consensus_commit_digest = 5;

  // Digest of any additional state computed by the consensus handler.
  // Used to detect forking bugs as early as possible.
  optional string additional_state_digest = 6;
}

// Per-consensus-commit accumulator settlement system transaction.
//
// The consensus handler injects exactly one of these per commit. Its
// `changes` field carries the aggregated net (owner, coin_type) deltas
// from every user transaction's emitted balance events; the executor
// applies them as deltas to the on-chain accumulator-balance table.
//
// Sender is always the system address (0x0...0). The
// (epoch, round, sub_dag_index) triplet makes the digest unique per
// commit even when `changes` is empty.
message Settlement {
  // Epoch of the commit this settlement belongs to.
  optional uint64 epoch = 1;

  // Consensus round of the commit.
  optional uint64 round = 2;

  // Sub-DAG index, populated when a round has multiple commits.
  optional uint64 sub_dag_index = 3;

  // Aggregated net per-(owner, coin_type) deltas. May be empty.
  // Indexers that don't track balances can ignore this field.
  repeated SettlementChange changes = 4;
}

// One entry in a Settlement's `changes` list. Equivalent to a
// post-aggregation BalanceEvent: net positive deltas surface as
// `is_credit=true`, net negatives as `is_credit=false`. `amount` is
// the absolute magnitude of the net delta.
message SettlementChange {
  optional string owner = 1;
  // Coin type label ("USDC", "SOMA", etc.) — same encoding as
  // elsewhere in the proto.
  optional string coin_type = 2;
  optional uint64 amount = 3;
  // True for net deposits, false for net withdrawals.
  optional bool is_credit = 4;
}

// Submit data to a target in the data submission competition.
message SubmitData {
  optional string target_id = 1;
  // Field 2 removed (was data_commitment)
  optional SubmissionManifest data_manifest = 3;
  optional string model_id = 4;
  repeated float embedding = 5;
  optional float distance_score = 6;
  optional ObjectReference bond_coin = 7;
  repeated float loss_score = 8;
}

// Claim rewards from a filled or expired target.
message ClaimRewards {
  // Target ID (ObjectID hex string)
  optional string target_id = 1;
}

// Manifest for submitted data (URL + metadata).
message SubmissionManifest {
  optional Manifest manifest = 1;
}

// Initiate a challenge against a filled target.
message InitiateChallenge {
  // Target ID (ObjectID hex string) to challenge
  optional string target_id = 1;

  // Type of challenge (e.g., "data_unavailable", "model_unavailable", "data_fraud", "score_fraud")
  optional string challenge_type = 2;

  // For ModelUnavailable challenges: the model ID that is unavailable
  optional string model_id = 3;

  // Bond coin reference
  optional ObjectReference bond_coin = 4;
}

// Report a challenge (validators only).
// Reports indicate "the challenger is wrong" (i.e., the submission is valid).
// If 2f+1 validators report, the challenger loses their bond.
message ReportChallenge {
  // Challenge ID (ObjectID hex string)
  optional string challenge_id = 1;
}

// Undo a previous challenge report.
message UndoReportChallenge {
  // Challenge ID (ObjectID hex string)
  optional string challenge_id = 1;
}

// Claim the challenger's bond after challenge window closes.
// Distributes bond based on tally-based report quorum.
message ClaimChallengeBond {
  // Challenge ID (ObjectID hex string)
  optional string challenge_id = 1;
}

// === Payment-channel messages ===

// Open a new payment channel. The transaction sender becomes the
// channel's `payer`. `token` is "SOMA" or "USDC" — Phase 1 only
// supports USDC.
message OpenChannel {
  optional string payee = 1;
  // Address whose key will sign vouchers. Typically equal to the
  // payer; differs when the payer wants a hot/cold key split.
  optional string authorized_signer = 2;
  // Coin denomination as a string ("SOMA" / "USDC").
  optional string token = 3;
  // Stage 8: deposit is debited from the sender's accumulator
  // balance, not a coin object. Field 4 (deposit_coin) was removed.
  optional uint64 deposit_amount = 5;
}

// Submit a voucher to the channel for partial payment. Channel
// stays open. Caller MUST be the payee.
message Settle {
  // Channel object ID (hex string).
  optional string channel_id = 1;
  // Cumulative amount the voucher authorizes — must be strictly
  // greater than the channel's current settled_amount and at most
  // the deposit + settled_amount.
  optional uint64 cumulative_amount = 2;
  // Voucher signature: BCS-encoded `IntentMessage<Voucher>` with
  // `IntentScope::PaymentVoucher` signed by the channel's
  // `authorized_signer`. Encoded via `GenericSignature` so MultiSig
  // signers work transparently. Bytes form is `flag || sig || pk`.
  optional bytes voucher_signature = 3;
}

// Payer-only: start the forced-close grace timer. The Clock's
// current timestamp is recorded onto the channel.
message RequestClose {
  // Channel object ID (hex string).
  optional string channel_id = 1;
}

// Payer-only: after the grace period elapses, return the
// remaining deposit to the payer and delete the channel.
message WithdrawAfterTimeout {
  // Channel object ID (hex string).
  optional string channel_id = 1;
}
