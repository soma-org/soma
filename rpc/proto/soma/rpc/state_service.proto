syntax = "proto3";

package soma.rpc;

import "google/protobuf/field_mask.proto";
import "google/protobuf/struct.proto";
import "soma/rpc/executed_transaction.proto";
import "soma/rpc/object.proto";
import "soma/rpc/system_state.proto";
import "soma/rpc/transaction.proto";


service StateService {
  rpc ListOwnedObjects(ListOwnedObjectsRequest) returns (ListOwnedObjectsResponse);
  rpc GetBalance(GetBalanceRequest) returns (GetBalanceResponse);
  rpc GetBid(GetBidRequest) returns (GetBidResponse);
  rpc GetAsk(GetAskRequest) returns (GetAskResponse);
  rpc GetSettlement(GetSettlementRequest) returns (GetSettlementResponse);
  rpc GetBidsForAsk(GetBidsForAskRequest) returns (GetBidsForAskResponse);
  rpc GetOpenAsks(GetOpenAsksRequest) returns (GetOpenAsksResponse);
  rpc GetVault(GetVaultRequest) returns (GetVaultResponse);
  rpc GetSettlements(GetSettlementsRequest) returns (GetSettlementsResponse);

  rpc GetProtocolFund(GetProtocolFundRequest) returns (GetProtocolFundResponse);
  rpc GetReputation(GetReputationRequest) returns (GetReputationResponse);

  // Streaming subscriptions for marketplace discovery
  rpc SubscribeAsks(SubscribeAsksRequest) returns (stream AskEvent);
  rpc SubscribeBids(SubscribeBidsRequest) returns (stream BidEvent);
}

// Request message for `LiveDataService.GetBalance`.
message GetBalanceRequest {
  // Required. The owner's Sui address.
  optional string owner = 1;
}

// Response message for `LiveDataService.GetBalance`.
// Return the total coin balance for coin, owned by the address owner.
message GetBalanceResponse {
  optional uint64 balance = 1;
}

message ListOwnedObjectsRequest {
  // Required. The address of the account that owns the objects.
  optional string owner = 1;

  // The maximum number of entries return. The service may return fewer than this value.
  // If unspecified, at most `50` entries will be returned.
  // The maximum value is `1000`; values above `1000` will be coerced to `1000`.
  optional uint32 page_size = 2;

  // A page token, received from a previous `ListOwnedObjects` call.
  // Provide this to retrieve the subsequent page.
  //
  // When paginating, all other parameters provided to `ListOwnedObjects` must
  // match the call that provided the page token.
  optional bytes page_token = 3;

  // Mask specifying which fields to read.
  // If no mask is specified, defaults to `object_id,version,object_type`.
  optional google.protobuf.FieldMask read_mask = 4;

  // Optional type filter to limit the types of objects listed.
  //
  // Providing an object type with no type params will return objects of that
  // type with any type parameter.
  optional string object_type = 5;
}

message ListOwnedObjectsResponse {
  // Page of dynamic fields owned by the specified parent.
  repeated Object objects = 1;

  // A token, which can be sent as `page_token` to retrieve the next page.
  // If this field is omitted, there are no subsequent pages.
  optional bytes next_page_token = 2;
}

// Request message for `StateService.GetBid`.
message GetBidRequest {
  // Required. The bid ID (ObjectID hex string).
  optional string bid_id = 1;
}

// Response message for `StateService.GetBid`.
message GetBidResponse {
  optional Object bid = 1;
}

// Request message for `StateService.GetAsk`.
message GetAskRequest {
  // Required. The ask ID (ObjectID hex string).
  optional string ask_id = 1;
}

// Response message for `StateService.GetAsk`.
message GetAskResponse {
  optional Object ask = 1;
}

// Request message for `StateService.GetSettlement`.
message GetSettlementRequest {
  // Required. The settlement ID (ObjectID hex string).
  optional string settlement_id = 1;
}

// Response message for `StateService.GetSettlement`.
message GetSettlementResponse {
  optional Object settlement = 1;
}

// Request message for `StateService.GetBidsForAsk`.
message GetBidsForAskRequest {
  // Required. The ask ID to get bids for.
  optional string ask_id = 1;
  // Optional filter by bid status (e.g., "Pending", "Accepted").
  optional string status_filter = 2;
}

// Response message for `StateService.GetBidsForAsk`.
message GetBidsForAskResponse {
  repeated Object bids = 1;
}

// Request message for `StateService.GetOpenAsks`.
message GetOpenAsksRequest {
  // Optional: filter by buyer address.
  optional string buyer = 1;
  // Maximum number of asks to return. Default: 100.
  optional uint32 page_size = 2;
}

// Response message for `StateService.GetOpenAsks`.
message GetOpenAsksResponse {
  repeated Object asks = 1;
}

// Request message for `StateService.GetVault`.
message GetVaultRequest {
  // Required. The vault owner's address. Returns the first SellerVault owned by this address.
  optional string owner = 1;
}

// Response message for `StateService.GetVault`.
message GetVaultResponse {
  // All vaults owned by the address (there may be multiple from different settlements).
  repeated Object vaults = 1;
}

// Request message for `StateService.GetSettlements`.
message GetSettlementsRequest {
  // Optional: filter by buyer address.
  optional string buyer = 1;
  // Optional: filter by seller address.
  optional string seller = 2;
  // Maximum number of settlements to return. Default: 100.
  optional uint32 page_size = 3;
}

// Response message for `StateService.GetSettlements`.
message GetSettlementsResponse {
  repeated Object settlements = 1;
}

// Request message for `StateService.SubscribeAsks`.
// Sellers use this to listen for new asks in real-time.
message SubscribeAsksRequest {
  // Optional: maximum price filter (only asks with max_price_per_bid >= this value).
  optional uint64 min_max_price = 1;
}

// A new or updated ask event streamed to subscribers.
message AskEvent {
  optional Object ask = 1;
  // "created", "filled", "cancelled", "expired"
  optional string event_type = 2;
}

// Request message for `StateService.SubscribeBids`.
// Buyers use this to listen for new bids on their asks.
message SubscribeBidsRequest {
  // Required. The ask ID to watch for bids.
  optional string ask_id = 1;
}

// A new bid event streamed to subscribers.
message BidEvent {
  optional Object bid = 1;
}

// Request message for `StateService.GetProtocolFund`.
message GetProtocolFundRequest {}

// Response message for `StateService.GetProtocolFund`.
message GetProtocolFundResponse {
  // Current Protocol Fund USDC balance in microdollars.
  optional uint64 balance = 1;
}

// Request message for `StateService.GetReputation`.
message GetReputationRequest {
  // Required. The address to query reputation for.
  optional string address = 1;
}

// Response message for `StateService.GetReputation`.
// Reputation is computed server-side from settlement data.
message GetReputationResponse {
  optional string address = 1;
  // As buyer
  optional uint64 buyer_settlements = 2;
  optional uint64 buyer_volume_spent = 3;
  optional uint64 buyer_unique_sellers = 4;
  // As seller
  optional uint64 seller_settlements = 5;
  optional uint64 seller_volume_earned = 6;
  optional uint64 seller_negative_ratings = 7;
  optional double seller_approval_rate = 8;
  optional uint64 seller_unique_buyers = 9;
}
